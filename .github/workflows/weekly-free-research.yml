name: Weekly Free Legal Research

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  research:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run free research script
        env:
          API_BASE_URL: https://dnp-memory-server.onrender.com/api
          MEMORY_API_KEY: ${{ secrets.MEMORY_API_KEY }}
        run: python cron_free_research.py